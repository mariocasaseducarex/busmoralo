<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bus Urbano de Navalmoral de la Mata</title>
<link rel="icon" type="image/x-icon" href="img/logoescudo.ico">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body {
  height: 100%;
}

body{
font-family: Arial;
margin:0;
}

:root{
  --base-font: 16px;
}

header{
background:#d0e0f0;
color:rgb(2, 26, 134);
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 15px;
position: relative;
z-index: 1000;
}

header .header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

header .title {
  margin: 0;
  font-size: 1.2rem;
}

.line-selector {
  display: flex;
  gap: 8px;
}

.line-selector button {
  border: none;
  background: transparent;
  color: rgb(2, 26, 134);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
}

.line-selector button:hover {
  background: rgba(0,0,0,0.07);
}

.line-selector button.active {
  background: rgba(0,0,0,0.14);
  font-weight: bold;
}

.line-selector button:focus {
  outline: 3px solid rgba(0,102,204,0.25);
  outline-offset: 2px;
}

header .logo {
  height: 42px;
  width: auto;
  margin-left: 12px;
}
#map{
position: absolute;
top: 60px;
bottom: 0;
left: 0;
right: 0;
width: 100%;
}

.info-panel {
  position: absolute;
  bottom: 120px;
  right: 20px;
  width: 220px;
  height: auto;
  max-height: 260px;
  background: rgba(255,255,255,0.95);
  padding: 10px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  z-index: 1001;
  overflow-y: auto;
  font-size: 10px;
  display: none;
}

.info-panel[aria-hidden="false"] {
  display: block;
}

.info-panel .schedule-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 8px;
}

.info-panel .schedule-column {
  background: rgba(0,0,0,0.04);
  padding: 6px;
  border-radius: 6px;
}

.info-panel .schedule-line {
  font-weight: bold;
  margin-bottom: 4px;
}

.info-panel .schedule-time {
  line-height: 1.2;
}

.info-panel .close-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #ccc;
  border: none;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
}

.info{
padding:10px;
background:#f4f4f4;
}

.linea1{
color:#0066cc;
font-weight:bold;
}

.linea2{
color:#8B4513;
font-weight:bold;
}

.custom-marker {
    background: transparent;
    border: none;
}

/* Hide Leaflet routing-machine empty control box */
.leaflet-routing-container {
  display: none !important;
}

/* Responsive adjustments */
@media (max-width: 600px) {
  :root { --base-font: 18px; }
  body { font-size: 16px; }
  header { padding: 10px; }
  header .title { font-size: 1rem; }
  header .logo { height: 34px; }
  .line-selector button { padding: 10px 14px; font-size: 1rem; }
  #map { top: 72px; }
  .info-panel { right: 5%; left: 5%; bottom: 12px; width: auto; max-height: 45vh; font-size: 14px; padding: 12px; border-radius: 10px; }
  .info-panel .schedule-column { padding: 8px; }
  .info-panel .schedule-time { font-size: 1rem; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

</style>

</head>

<body>

<header>
  <div class="header-left">
    <h2 class="title">Bus Urbano de Navalmoral de la Mata</h2>
    <nav class="line-selector" role="navigation" aria-label="Selector de línea">
      <button id="linea1-btn" class="active" data-line="L1" aria-pressed="true" aria-label="Mostrar Línea 1">Línea 1</button>
      <button id="linea2-btn" data-line="L2" aria-pressed="false" aria-label="Mostrar Línea 2">Línea 2</button>
    </nav>
  </div>
  <img class="logo" src="img/escudonavamoral.png" alt="Escudo de Navalmoral de la Mata" />
</header>

<div id="map"></div>

<div id="info-panel" class="info-panel" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Información de parada">
  <button class="close-btn" onclick="hideInfo()" aria-label="Cerrar información">×</button>
  <div id="info-content"></div>
</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.min.js"></script>

<script>

//añadido por mí-----------------------
var stopsBounds = L.latLngBounds([]);

//---------------------------------------

var navalmoralBounds = L.latLngBounds([
    [39.865, -5.605],
    [39.925, -5.475]
]);

var map = L.map('map', {
    center: [39.8916, -5.5403],
    zoom: 13,
    minZoom: 13,
    maxZoom: 18,
    zoomControl: true
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

// Ruta L1 siguiendo las calles (OSRM)
var rutaL1Waypoints = [
  L.latLng(39.89593665304968, -5.545329987670535), // Silo
   L.latLng(39.89696422040098, -5.538571561339239), // Navarrosa
  L.latLng(39.89117875751934, -5.53054470402191), // Marcha Verde
  L.latLng(39.890326, -5.535922), // La Gota
  L.latLng(39.892250, -5.538347), // Los Colorines
  L.latLng(39.89581043396135, -5.538896528668628), // Genaro Cajal / Cartagena
  L.latLng(39.89518936633725, -5.542764570229975), // Estación de Autobuses
  L.latLng(39.89204335743384, -5.545121723808191), // Cruz de los Caídos
  L.latLng(39.892323117180524, -5.550879202777898), // Ambulatorio
  L.latLng(39.888488891031265, -5.561153301912327), // Hospital Campo Arañuelo
  L.latLng(39.892219543022726, -5.550901152427424), // Ambulatorio (Vuelta)
  L.latLng(39.89015116167454, -5.545782507838506), // Ronda Sur
  L.latLng(39.88873892662456, -5.541159335330454), // Ronda Sur / Ctra. Valdehúncar
  L.latLng(39.89022679608061, -5.535731362484204), // La Gota (vuelta)
  L.latLng(39.89067582505434, -5.5317100369435845),  // Marcha Verde (vuelta)
  L.latLng(39.89714310027718, -5.538845697135179), // Navarrosa (vuelta)
  L.latLng(39.89593665304968, -5.545329987670535) // Silo (vuelta)

];

var routingControl = L.Routing.control({
  waypoints: rutaL1Waypoints,
  router: L.Routing.osrmv1({serviceUrl: 'https://router.project-osrm.org/route/v1'}),
  lineOptions: {styles: [{color: '#0066cc', opacity: 0.7, weight: 4}]},
  addWaypoints: false,
  draggableWaypoints: false,
  fitSelectedRoute: false,
  show: false,
  routeWhileDragging: false,
  createMarker: function() { return null; }
});

routingControl.on('routesfound', function() {
    fitBoundsToActiveMarkers();
});

// Ruta L2 siguiendo las calles (OSRM)
var rutaL2Waypoints = [
  L.latLng(39.892035005367596, -5.545145706808227), // Plaza Pepe Vizcaíno
  L.latLng(39.89207084110331, -5.548122445662967), // Punto intermedio
  L.latLng(39.889357816694066, -5.542759184938737), // Ronda Sur / Marqués de Comillas
  L.latLng(39.88875481511176, -5.540798490148853), // Ronda Sur / Valdehúncar
  L.latLng(39.890088991785014, -5.535934862117679), // Cruz del Rollo
  L.latLng(39.892250, -5.538347), // Los Colorines
  L.latLng(39.895734, -5.538822), // Genaro Cajal / Cartagena
  L.latLng(39.897134, -5.538749), // Navarrosa
  L.latLng(39.89774207768, -5.544290645204779), // Campo de Fútbol
  L.latLng(39.91270936623701, -5.559816319323396), // Ciudad Deportiva
  L.latLng(39.89606049320882, -5.544903589159379), // Silo
  L.latLng(39.892035005367596, -5.545145706808227)  // Plaza Pepe Vizcaíno (vuelta)
];

var routingControlL2 = L.Routing.control({
  waypoints: rutaL2Waypoints,
  router: L.Routing.osrmv1({serviceUrl: 'https://router.project-osrm.org/route/v1'}),
  lineOptions: {styles: [{color: '#8B4513', opacity: 0.7, weight: 4}]},
  addWaypoints: false,
  draggableWaypoints: false,
  fitSelectedRoute: false,
  show: false,
  routeWhileDragging: false,
  createMarker: function() { return null; }
});

routingControlL2.on('routesfound', function() {
    fitBoundsToActiveMarkers();
});

var activeLine = 'L1';
var allMarkers = [];

var lineColors = {
  L1: '#0066cc',
  L2: '#8B4513',
  both: '#666666'
};

function createSvgIcon(color) {
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="25" height="41" viewBox="0 0 25 41">'
          + '<path d="M12.5 0C5.6 0 0 5.6 0 12.5 0 21.9 12.5 41 12.5 41S25 21.9 25 12.5C25 5.6 19.4 0 12.5 0z" fill="' + color + '" stroke="#333" stroke-width="1"/>'
          + '<circle cx="12.5" cy="12.5" r="6" fill="white" fill-opacity="0.8"/>'
          + '</svg>';
  var iconUrl = 'data:image/svg+xml;base64,' + btoa(svg);
  return L.icon({
    iconUrl: iconUrl,
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
  });
}

var blueIcon = createSvgIcon('#0066cc');
var brownIcon = createSvgIcon('#8B4513');

function getIconForLineas(lineas) {
  return activeLine === 'L1' ? blueIcon : brownIcon;
}

function createColoredMarker(lat, lon, lineas, title) {
  var marker = L.marker([lat, lon], {icon: getIconForLineas(lineas), title: title || ''});
  // add a tooltip for sighted users
  marker.bindTooltip(title || '', {direction: 'top', offset: [0, -10], permanent: false});
  return marker;
}


/* HORARIOS */

var horariosL1=[
"08:00","09:00","10:00","11:00","12:00","13:00","14:00"
];

var horariosL2=[
"15:30","16:30","17:30","18:30","19:30"
];


/* FUNCIÓN PARA CREAR PARADAS */

function parada(nombre,lat,lon,linea,horariosCustom=null){
  stopsBounds.extend([lat, lon]);

  var lineas = Array.isArray(linea) ? linea : [linea];
  var marker = createColoredMarker(lat, lon, lineas, nombre);
  marker.lineas = lineas;
  marker.nombre = nombre;
  marker.horariosCustom = horariosCustom;

  marker.on('click', function() {
      showInfo(nombre, lineas, horariosCustom);
  });

  allMarkers.push(marker);
  if (lineas.includes(activeLine)) {
    marker.addTo(map);
  }
}

function showInfo(nombre, lineas, horariosCustom) {
    var content = buildScheduleGrid(nombre, lineas, horariosCustom);
    document.getElementById('info-content').innerHTML = content;
  var panel = document.getElementById('info-panel');
  panel.setAttribute('aria-hidden', 'false');
  panel.style.display = 'block';
  // focus close button for keyboard users
  var btn = panel.querySelector('.close-btn');
  if (btn) btn.focus();
}

function hideInfo() {
  var panel = document.getElementById('info-panel');
  panel.setAttribute('aria-hidden', 'true');
  panel.style.display = 'none';
}

function shouldShowLine(lineas, line) {
    return lineas.includes(line);
}

function updateMarkerVisibility() {
    allMarkers.forEach(function(marker) {
        if (shouldShowLine(marker.lineas, activeLine)) {
            if (!map.hasLayer(marker)) {
                marker.addTo(map);
            }
        } else {
            if (map.hasLayer(marker)) {
                map.removeLayer(marker);
            }
        }
    });
}

function fitBoundsToActiveMarkers() {
    var bounds = L.latLngBounds([]);
    allMarkers.forEach(function(marker) {
        if (shouldShowLine(marker.lineas, activeLine)) {
            bounds.extend(marker.getLatLng());
        }
    });
    if (bounds.isValid()) {
        map.fitBounds(bounds, { padding: [80,80] });
    }
}

var currentRouteControl = null;

function updateMarkerIcons() {
    allMarkers.forEach(function(marker) {
        marker.setIcon(getIconForLineas(marker.lineas));
    });
}

function updateRouteDisplay() {
    if (currentRouteControl) {
        map.removeControl(currentRouteControl);
        currentRouteControl = null;
    }

    currentRouteControl = (activeLine === 'L1') ? routingControl : routingControlL2;
    currentRouteControl.addTo(map);

    updateMarkerVisibility();
    updateMarkerIcons();
    fitBoundsToActiveMarkers();
}

function setActiveLine(line) {
    activeLine = line;
  var b1 = document.getElementById('linea1-btn');
  var b2 = document.getElementById('linea2-btn');
  b1.classList.toggle('active', line === 'L1');
  b2.classList.toggle('active', line === 'L2');
  b1.setAttribute('aria-pressed', line === 'L1' ? 'true' : 'false');
  b2.setAttribute('aria-pressed', line === 'L2' ? 'true' : 'false');
    hideInfo();
    updateRouteDisplay();
}

var linea1Btn = document.getElementById('linea1-btn');
var linea2Btn = document.getElementById('linea2-btn');
linea1Btn.addEventListener('click', function() { setActiveLine('L1'); });
linea2Btn.addEventListener('click', function() { setActiveLine('L2'); });

function buildScheduleGrid(nombre, lineas, horariosCustom) {
    var html = '<b>' + nombre + '</b><br><br>';
    html += '<div class="schedule-grid">';

    lineas.forEach(function(l) {
        var horarios = horariosCustom && horariosCustom[l] ? horariosCustom[l] : (l === 'L1' ? horariosL1 : horariosL2);
        html += '<div class="schedule-column">';
        html += '<div class="schedule-line">Línea ' + l + '</div>';
        horarios.forEach(function(h) {
            html += '<div class="schedule-time">' + h + '</div>';
        });
        html += '</div>';
    });

    html += '</div>';
    return html;
}

// Cerrar panel al hacer click en el mapa
map.on('click', function() {
    hideInfo();
});

setActiveLine(activeLine);

/* PARADAS L1 */

parada("Marcha Verde",39.890748, -5.531859,"L1",{
  L1: ["08:00","09:00","10:00","11:00","12:00","13:00","14:00"]
});
parada("Cruz del Rollo",39.890326, -5.535922,["L1","L2"], {
  L1: ["08:05","09:05","10:05","11:05","12:05","13:05","14:05"],
  L2: ["15:45","16:45","17:45","18:45","19:45"]
});
parada("Los Colorines",39.892250, -5.538347,["L1","L2"]);
parada("Genaro Cajal / Cartagena",39.895734, -5.538822,["L1","L2"]);
parada("Navarrosa",39.897134, -5.538749,["L1","L2"]);
parada("Silo",39.89606049320882, -5.544903589159379,"L1");
parada("Plaza Pepe Vizcaíno",39.892035005367596, -5.545145706808227,["L1","L2"]);
parada("Hospital Campo Arañuelo",39.8884254926139, -5.561181591792536,"L1");
parada("Centro de Salud",39.892217478784396, -5.551167325379351,"L1");
parada("Mercadona",39.890214305657715, -5.535739246910879,"L1");


/* PARADAS L2 */

parada("Ronda Sur / Marqués de Comillas",39.889357816694066, -5.542759184938737,"L2");
parada("Ronda Sur / Valdehúncar",39.88875481511176, -5.540798490148853,"L2");
parada("Campo de Fútbol",39.89774207768, -5.544290645204779,"L2");
parada("Ciudad Deportiva",39.91270936623701, -5.559816319323396,"L2");



</script>

</body>
</html>
