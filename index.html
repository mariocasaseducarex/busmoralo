<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bus Urbano de Navalmoral de la Mata</title>
  <link rel="icon" type="image/png" href="img/logoescudo.PNG" sizes="32x32">
  <link rel="shortcut icon" type="image/png" href="img/logoescudo.PNG" sizes="32x32">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <header>
    <div class="header-left">
      <div class="header-brand-group">
        <img class="header-brand-image" src="img/LogoBus.png" alt="Logo del autobús urbano de Navalmoral de la Mata" />
        <img class="logo" src="img/escudonavamoral.png" alt="Escudo de Navalmoral de la Mata" />
      </div>
      <nav class="line-selector" role="navigation" aria-label="Selector de línea">
        <button id="linea1-btn" class="active" data-line="L1" aria-pressed="true" aria-label="Mostrar Línea 1">Línea
          1</button>
        <button id="linea2-btn" data-line="L2" aria-pressed="false" aria-label="Mostrar Línea 2">Línea 2</button>
        <a id="legend-btn" class="legend-button" href="galeria.html" aria-label="Abrir galería de información">Información</a>
      </nav>
      <a id="back-link" class="back-btn" href="https://www.aytonavalmoral.es/" aria-label="Volver al Ayuntamiento" title="Volver al Ayuntamiento">
        <svg class="back-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Volver
      </a>
    </div>
  </header>


  <div id="image-viewer-modal" class="image-viewer-modal" role="dialog" aria-modal="true" aria-hidden="true"
    aria-label="Visualizador de imagen">
    <div class="image-viewer-content">
      <button id="image-viewer-close" class="image-viewer-close" type="button" aria-label="Cerrar imagen">×</button>
      <img id="image-viewer-img" src="" alt="" />
    </div>
  </div>

  <div id="map"></div>

  <div id="info-panel" class="info-panel" role="dialog" aria-modal="true" aria-hidden="true"
    aria-label="Información de parada">
    <div class="panel-actions">
      <button id="expand-info-btn" class="panel-btn" type="button" aria-label="Ampliar información">🔍 Ampliar</button>
      <button id="speak-info-btn" class="panel-btn" type="button" aria-label="Leer la información en voz alta">🔊
        Leer</button>
    </div>
    <button class="close-btn" onclick="hideInfo()" aria-label="Cerrar información">×</button>
    <div id="info-content" class="info-content-inner"></div>
  </div>


  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.min.js"></script>
  <script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>

  <script>


    var imageViewerModal = document.getElementById('image-viewer-modal');
    var imageViewerCloseBtn = document.getElementById('image-viewer-close');
    var imageViewerImg = document.getElementById('image-viewer-img');
    var logoBusImg = document.querySelector('.header-brand-image');
    var escudoImg = document.querySelector('.logo');

    function openImageViewer(src, alt) {
      if (!imageViewerModal || !imageViewerImg) return;
      imageViewerImg.src = src;
      imageViewerImg.alt = alt;
      imageViewerModal.classList.add('is-open');
      imageViewerModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      if (imageViewerCloseBtn) imageViewerCloseBtn.focus();
    }

    function closeImageViewer() {
      if (!imageViewerModal) return;
      imageViewerModal.classList.remove('is-open');
      imageViewerModal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      if (imageViewerImg) imageViewerImg.src = '';
    }

    if (logoBusImg) {
      logoBusImg.addEventListener('click', function () {
        openImageViewer(this.src, this.alt);
      });
    }

    if (escudoImg) {
      escudoImg.addEventListener('click', function () {
        openImageViewer(this.src, this.alt);
      });
    }

    if (imageViewerCloseBtn) {
      imageViewerCloseBtn.addEventListener('click', closeImageViewer);
    }

    if (imageViewerModal) {
      imageViewerModal.addEventListener('click', function (event) {
        if (event.target === imageViewerModal) {
          closeImageViewer();
        }
      });
    }

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') {
        closeImageViewer();
      }
    });

    //añadido por mí-----------------------

    // ==========================================================
    // Adaptador de Valhalla para Leaflet Routing Machine
    // ==========================================================
    // Sustituye OpenRouteService por Valhalla (https://valhalla.github.io/valhalla/),
    // un motor de rutas open-source. Aquí usamos el servidor público de
    // demostración que mantiene el proyecto OSM Alemania:
    // https://valhalla1.openstreetmap.de/route
    // Es gratuito y no requiere API key, pero es un servicio de "fair use"
    // sin garantías de disponibilidad ni SLA. Para producción se recomienda
    // levantar una instancia propia de Valhalla (Docker: ghcr.io/valhalla/valhalla)
    // o contratar un proveedor (p.ej. https://gis-ops.com, Stadia Maps, etc.)
    // y cambiar VALHALLA_ENDPOINT por la URL de tu propio servidor.
    var VALHALLA_ENDPOINT = 'https://valhalla1.openstreetmap.de/route';

    // Identificador de la app, tal y como pide FOSSGIS a quien use su
    // servidor público: https://github.com/valhalla/valhalla (ver README,
    // sección "Getting the code" / demo server). Se envía como cabecera
    // X-Client-Id en cada petición para que puedan identificar el origen
    // del tráfico si hiciera falta contactar o depurar algún problema.
    var VALHALLA_CLIENT_ID = 'bus-urbano-navalmoral-de-la-mata';

    // Cuánto tiempo se guarda en caché (localStorage) el resultado de cada
    // ruta calculada, para no repetir la misma consulta a Valhalla en cada
    // visita. Las líneas de autobús cambian muy de vez en cuando, así que
    // 24h de caché reduce mucho la carga sobre el servidor sin arriesgarse
    // a mostrar una ruta desactualizada durante mucho tiempo.
    var VALHALLA_CACHE_MAX_AGE_MS = 24 * 60 * 60 * 1000;
    var VALHALLA_CACHE_PREFIX = 'valhalla_route_cache_v1_';

    // Hash corto y estable de un string, usado para generar claves de
    // localStorage que no superen límites de longitud.
    function simpleHash(str) {
      var hash = 0, i, chr;
      for (i = 0; i < str.length; i++) {
        chr = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + chr;
        hash |= 0;
      }
      return Math.abs(hash).toString(36);
    }

    function readRouteCache(key) {
      try {
        var raw = localStorage.getItem(key);
        if (!raw) return null;
        var parsed = JSON.parse(raw);
        if (!parsed || typeof parsed.t !== 'number') return null;
        if (Date.now() - parsed.t > VALHALLA_CACHE_MAX_AGE_MS) return null;
        return parsed;
      } catch (e) {
        // localStorage puede no estar disponible (navegación privada, cuotas
        // agotadas, etc.); en ese caso simplemente no usamos caché.
        return null;
      }
    }

    function writeRouteCache(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch (e) {
        // Igual que arriba: si falla, no pasa nada, solo no se cachea.
      }
    }

    // Decodifica el "shape" de Valhalla, que es un polyline codificado con
    // precisión 6 (a diferencia del estándar de Google Maps, que usa 5).
    function decodeValhallaPolyline(str, precision) {
      var index = 0, lat = 0, lng = 0, coordinates = [],
        shift, result, byte, latChange, lngChange,
        factor = Math.pow(10, precision || 6);

      while (index < str.length) {
        byte = null; shift = 0; result = 0;
        do {
          byte = str.charCodeAt(index++) - 63;
          result |= (byte & 0x1f) << shift;
          shift += 5;
        } while (byte >= 0x20);
        latChange = (result & 1) ? ~(result >> 1) : (result >> 1);

        shift = result = 0;
        do {
          byte = str.charCodeAt(index++) - 63;
          result |= (byte & 0x1f) << shift;
          shift += 5;
        } while (byte >= 0x20);
        lngChange = (result & 1) ? ~(result >> 1) : (result >> 1);

        lat += latChange;
        lng += lngChange;
        coordinates.push([lat / factor, lng / factor]);
      }
      return coordinates;
    }

    function ValhallaRouter(options) {
      // Perfiles ("costing") típicos de Valhalla: 'auto', 'bus', 'bicycle',
      // 'pedestrian', 'truck'... 'bus' tiene en cuenta restricciones propias
      // de autobuses cuando el mapa de OSM las tiene etiquetadas; si da
      // problemas en tu zona, prueba con 'auto'.
      this._costing = (options && options.costing) || 'auto';
      this._endpoint = (options && options.endpoint) || VALHALLA_ENDPOINT;
      // El servidor público de Valhalla limita a 20 ubicaciones por petición
      // para los perfiles 'auto'/'bus'. Si una ruta tiene más waypoints,
      // la partimos en varios tramos y los unimos en el cliente.
      this._maxLocations = (options && options.maxLocations) || 20;
    }

    // Parte un array de waypoints en trozos de como máximo maxSize elementos,
    // repitiendo el último punto de cada trozo como primero del siguiente
    // para que la ruta resultante sea continua.
    function chunkWaypoints(waypoints, maxSize) {
      if (waypoints.length <= maxSize) return [waypoints];
      var chunks = [];
      var i = 0;
      while (i < waypoints.length - 1) {
        var end = Math.min(i + maxSize, waypoints.length);
        chunks.push(waypoints.slice(i, end));
        if (end === waypoints.length) break;
        i = end - 1;
      }
      return chunks;
    }

    ValhallaRouter.prototype.route = function (waypoints, callback, context) {
      var self = this;

      var locationsAll = waypoints.map(function (wp) {
        return { lat: wp.latLng.lat, lon: wp.latLng.lng };
      });
      var cacheKey = VALHALLA_CACHE_PREFIX + simpleHash(self._costing + '|' + JSON.stringify(locationsAll));

      function buildRouteFromCoords(coordsArray, totalDistance, totalTime) {
        var latlngs = coordsArray.map(function (c) {
          return L.latLng(c[0], c[1]);
        });
        return {
          name: '',
          coordinates: latlngs,
          instructions: [],
          summary: { totalDistance: totalDistance, totalTime: totalTime },
          waypoints: waypoints.map(function (wp) { return wp.latLng; }),
          inputWaypoints: waypoints.map(function (wp) { return wp.latLng; })
        };
      }

      var cached = readRouteCache(cacheKey);
      if (cached) {
        // Devolvemos la ruta cacheada de forma asíncrona (con Promise.resolve)
        // para respetar el contrato async de Leaflet Routing Machine.
        Promise.resolve().then(function () {
          callback.call(context, null, [buildRouteFromCoords(cached.coords, cached.distance, cached.time)]);
        });
        return;
      }

      var chunks = chunkWaypoints(waypoints, this._maxLocations);

      var requests = chunks.map(function (chunk) {
        var locations = chunk.map(function (wp) {
          return { lat: wp.latLng.lat, lon: wp.latLng.lng };
        });

        return fetch(self._endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Client-Id': VALHALLA_CLIENT_ID
          },
          body: JSON.stringify({
            locations: locations,
            costing: self._costing,
            units: 'kilometers'
          })
        }).then(function (resp) {
          if (!resp.ok) {
            return resp.text().then(function (text) {
              throw new Error('Valhalla respondió ' + resp.status + ': ' + text);
            });
          }
          return resp.json();
        });
      });

      Promise.all(requests)
        .then(function (results) {
          var allCoords = [];
          var totalDistanceKm = 0;
          var totalTimeSec = 0;

          results.forEach(function (data, chunkIndex) {
            var trip = data.trip;
            if (!trip || !trip.legs || !trip.legs.length) {
              throw new Error('Valhalla no devolvió ruta para uno de los tramos');
            }

            // Un "trip" puede tener varios "legs" (uno por tramo entre
            // waypoints consecutivos dentro del mismo trozo); los unimos
            // evitando duplicar el punto de unión entre legs.
            var chunkCoords = [];
            trip.legs.forEach(function (leg, legIndex) {
              var coords = decodeValhallaPolyline(leg.shape, 6);
              if (legIndex > 0) coords = coords.slice(1);
              chunkCoords = chunkCoords.concat(coords);
            });

            // El primer punto de cada trozo (salvo el primero) es el mismo
            // que el último punto del trozo anterior: lo quitamos.
            if (chunkIndex > 0) chunkCoords = chunkCoords.slice(1);

            allCoords = allCoords.concat(chunkCoords);

            var summary = trip.summary || { length: 0, time: 0 };
            totalDistanceKm += summary.length;
            totalTimeSec += summary.time;
          });

          // Valhalla da la longitud en kilómetros (por el "units" pedido) y el
          // tiempo en segundos; lo normalizamos a metros para mantener el
          // mismo formato que usaba el resto del código con OSRM/ORS.
          var totalDistance = totalDistanceKm * 1000;
          var totalTime = totalTimeSec;

          writeRouteCache(cacheKey, { t: Date.now(), coords: allCoords, distance: totalDistance, time: totalTime });

          callback.call(context, null, [buildRouteFromCoords(allCoords, totalDistance, totalTime)]);
        })
        .catch(function (err) {
          console.error('Error consultando Valhalla:', err);
          callback.call(context, { status: -1, message: err.message });
        });
    };

    L.Routing.ValhallaRouter = ValhallaRouter;
    // ==========================================================


    var stopsBounds = L.latLngBounds([]);
    var directionArrowLayers = [];

    function clearDirectionArrows() {
      directionArrowLayers.forEach(function (layer) {
        if (layer && map.hasLayer(layer)) {
          map.removeLayer(layer);
        }
      });
      directionArrowLayers = [];
    }

    function routeToLatLngs(route) {
      var latlngs = [];
      if (!route) return latlngs;
      if (route.coordinates && route.coordinates.length) {
        latlngs = route.coordinates.map(function (c) {
          if (Array.isArray(c) && c.length >= 2) return [c[1], c[0]]; // [lat,lng]
          if (c && c.lat !== undefined && c.lng !== undefined) return [c.lat, c.lng];
          return null;
        }).filter(Boolean);
      }
      return latlngs;
    }

    function haversineDistance(a, b) {
      var R = 6371000; var toRad = function (x) { return x * Math.PI / 180 };
      var dLat = toRad(b[0] - a[0]); var dLon = toRad(b[1] - a[1]);
      var lat1 = toRad(a[0]), lat2 = toRad(b[0]);
      var aa = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
      var c = 2 * Math.atan2(Math.sqrt(aa), Math.sqrt(1 - aa));
      return R * c;
    }

    function findClosestIndex(latlngs, target) {
      var best = 0; var bestD = Infinity;
      for (var i = 0; i < latlngs.length; i++) {
        var d = haversineDistance(latlngs[i], [target.lat, target.lng]);
        if (d < bestD) { bestD = d; best = i; }
      }
      return best;
    }

    function drawSplitRoute(route, colorBefore, colorAfter, midpointLatLng) {
      clearDirectionArrows();
      var latlngs = routeToLatLngs(route);
      if (!latlngs || latlngs.length < 2) return;
      var idx = findClosestIndex(latlngs, midpointLatLng);
      if (idx <= 0 || idx >= latlngs.length - 1) {
        // dibujar toda la ruta con colorBefore
        var poly = L.polyline(latlngs, { color: colorBefore, weight: 4, opacity: 0.9 }).addTo(map);
        var dec = L.polylineDecorator(poly, { patterns: [{ offset: '5%', repeat: 100, symbol: L.Symbol.arrowHead({ pixelSize: 9, polygon: true, pathOptions: { color: colorBefore, fillOpacity: 1 } }) }] });
        dec.addTo(map);
        directionArrowLayers.push(dec); directionArrowLayers.push(poly);
        return;
      }

      var seg1 = latlngs.slice(0, idx + 1);
      var seg2 = latlngs.slice(idx);

      var poly1 = L.polyline(seg1, { color: colorBefore, weight: 4, opacity: 0.9 }).addTo(map);
      var poly2 = L.polyline(seg2, { color: colorAfter, weight: 4, opacity: 0.95 }).addTo(map);

      var dec1 = L.polylineDecorator(poly1, { patterns: [{ offset: '5%', repeat: 100, symbol: L.Symbol.arrowHead({ pixelSize: 9, polygon: true, pathOptions: { color: colorBefore, fillOpacity: 1 } }) }] });
      var dec2 = L.polylineDecorator(poly2, { patterns: [{ offset: '5%', repeat: 100, symbol: L.Symbol.arrowHead({ pixelSize: 9, polygon: true, pathOptions: { color: colorAfter, fillOpacity: 1 } }) }] });

      dec1.addTo(map); dec2.addTo(map);
      directionArrowLayers.push(dec1); directionArrowLayers.push(dec2);
      directionArrowLayers.push(poly1); directionArrowLayers.push(poly2);
    }

    function addDirectionArrowsToRoute(route, color) {
      if (!route) return;

      // Normalizar coordenadas: aceptamos ambos formatos (array [lng,lat] o objeto {lat,lng}).
      var latlngs = [];
      if (route.coordinates && route.coordinates.length) {
        latlngs = route.coordinates.map(function (coord) {
          if (Array.isArray(coord) && coord.length >= 2) {
            // OSRM devuelve [lng, lat]
            return [coord[1], coord[0]];
          } else if (coord && coord.lat !== undefined && coord.lng !== undefined) {
            return [coord.lat, coord.lng];
          } else if (coord && coord.latitude !== undefined && coord.longitude !== undefined) {
            return [coord.latitude, coord.longitude];
          }
          return null;
        }).filter(Boolean);
      }

      if (!latlngs || latlngs.length < 2) return;

      // Creamos una polyline invisible que siga la geometría devuelta por la ruta
      var polyline = L.polyline(latlngs, { color: color, weight: 0, opacity: 0 }).addTo(map);

      // Decorador con flechas orientadas según la dirección del polyline.
      var decorator = L.polylineDecorator(polyline, {
        patterns: [{
          offset: '5%',        // empezar ligeramente desde el inicio
          repeat: 120,        // separación entre flechas en píxeles
          symbol: L.Symbol.arrowHead({
            pixelSize: 12,
            polygon: true,
            pathOptions: {
              color: color,
              fillOpacity: 1,
              weight: 1,
              opacity: 1
            }
          })
        }]
      });

      decorator.addTo(map);
      // Guardamos ambos para poder limpiarlos después
      directionArrowLayers.push(decorator);
      directionArrowLayers.push(polyline);
    }

    //---------------------------------------

    var navalmoralBounds = L.latLngBounds([
      [39.865, -5.605],
      [39.925, -5.475]
    ]);

    var map = L.map('map', {
      center: [39.8916, -5.5403],
      zoom: 13,
      minZoom: 13,
      maxZoom: 18,
      zoomControl: true
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Ruta L1 siguiendo las calles (OSRM)
    var rutaL1Waypoints = [
      L.latLng(39.89593665304968, -5.545329987670535), // Silo
      L.latLng(39.89696422040098, -5.538571561339239), // Navarrosa
      L.latLng(39.89117875751934, -5.53054470402191), // Marcha Verde
      L.latLng(39.890326, -5.535922), // La Gota
      L.latLng(39.892250, -5.538347), // Los Colorines
      L.latLng(39.89581043396135, -5.538896528668628), // Genaro Cajal / Cartagena 
      L.latLng(39.895206, -5.542914), // Ctra. Jarandilla
      L.latLng(39.895087, -5.543563), // Ctra. Jarandilla/Entrada Estación Autobuses
      L.latLng(39.892849170899524, -5.5451132366019795), // Paseo de la Estación
      L.latLng(39.89204335743384, -5.545121723808191), // Cruz de los Caídos
      L.latLng(39.892323117180524, -5.550879202777898), // Ambulatorio
      L.latLng(39.89080961048773, -5.559398531913758), // Subida a Hospital
      L.latLng(39.888488891031265, -5.561153301912327), // Hospital Campo Arañuelo
      L.latLng(39.892219543022726, -5.550901152427424), // Ambulatorio (Vuelta)
      L.latLng(39.89015116167454, -5.545782507838506), // Ronda Sur
      L.latLng(39.88873892662456, -5.541159335330454), // Ronda Sur / Ctra. Valdehúncar
      L.latLng(39.89022679608061, -5.535731362484204), // La Gota (vuelta)
      L.latLng(39.89067582505434, -5.5317100369435845),  // Marcha Verde (vuelta)
      L.latLng(39.89714310027718, -5.538845697135179), // Navarrosa (vuelta)
      L.latLng(39.89624361588451, -5.54551198946366), // Rotonda Silo (vuelta)
      L.latLng(39.89593665304968, -5.545329987670535) // Silo (vuelta)
    ];

    var routingControl = L.Routing.control({
      waypoints: rutaL1Waypoints,
      router: new L.Routing.ValhallaRouter({ costing: 'auto' }),
      lineOptions: { styles: [{ color: '#0066cc', opacity: 0.7, weight: 4 }] },
      addWaypoints: false,
      draggableWaypoints: false,
      fitSelectedRoute: false,
      show: false,
      routeWhileDragging: false,
      createMarker: function () { return null; }
    });

    routingControl.on('routesfound', function (e) {
      if (e.routes && e.routes.length) {
        // L1: desde Hospital pintar naranja a partir de ese punto
        drawSplitRoute(e.routes[0], '#0066cc', '#ff8c00', L.latLng(39.888488891031265, -5.561153301912327));
      } else {
        clearDirectionArrows();
      }
      fitBoundsToActiveMarkers();
    });

    // Ruta L2 siguiendo las calles (OSRM)
    var rutaL2Waypoints = [
      L.latLng(39.892035005367596, -5.545145706808227), // Cruz de los Caídos
      L.latLng(39.89207084110331, -5.548122445662967), // Punto intermedio
      L.latLng(39.89015116167454, -5.545782507838506), // Ronda Sur
      L.latLng(39.88873892662456, -5.541159335330454), // Ronda Sur / Ctra. Valdehúncar
      L.latLng(39.89022679608061, -5.535731362484204), // La Gota (vuelta)
      L.latLng(39.89067582505434, -5.5317100369435845),  // Marcha Verde (vuelta)
      L.latLng(39.89714310027718, -5.538845697135179), // Navarrosa (vuelta)
      L.latLng(39.89774207768, -5.544290645204779), // Campo de Fútbol
      L.latLng(39.91270936623701, -5.559816319323396), // Ciudad Deportiva
      L.latLng(39.89622395893707, -5.544903568259242), // Silo
      L.latLng(39.89557079448523, -5.549406406818009), // Punto intermedio
      L.latLng(39.89494824131144, -5.5542351524473474), // Punto intermedio
      L.latLng(39.89207523829097, -5.547344545709519), // Punto intermedio
      L.latLng(39.892035005367596, -5.545145706808227) // Cruz de los Caídos (vuelta)
    ];

    var routingControlL2 = L.Routing.control({
      waypoints: rutaL2Waypoints,
      router: new L.Routing.ValhallaRouter({ costing: 'auto' }),
      lineOptions: { styles: [{ color: '#8B4513', opacity: 0.7, weight: 4 }] },
      addWaypoints: false,
      draggableWaypoints: false,
      fitSelectedRoute: false,
      show: false,
      routeWhileDragging: false,
      createMarker: function () { return null; }
    });

    routingControlL2.on('routesfound', function (e) {
      if (e.routes && e.routes.length) {
        // L2: desde Ciudad Deportiva pintar naranja a partir de ese punto
        drawSplitRoute(e.routes[0], '#8B4513', '#ff8c00', L.latLng(39.91270936623701, -5.559816319323396));
      } else {
        clearDirectionArrows();
      }
      fitBoundsToActiveMarkers();
    });

    var activeLine = 'L1';
    var allMarkers = [];

    var lineColors = {
      L1: '#0066cc',
      L2: '#8B4513',
      both: '#666666'
    };

    function createSvgIcon(color) {
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="25" height="41" viewBox="0 0 25 41">'
        + '<path d="M12.5 0C5.6 0 0 5.6 0 12.5 0 21.9 12.5 41 12.5 41S25 21.9 25 12.5C25 5.6 19.4 0 12.5 0z" fill="' + color + '" stroke="#333" stroke-width="1"/>'
        + '<circle cx="12.5" cy="12.5" r="6" fill="white" fill-opacity="0.8"/>'
        + '</svg>';
      var iconUrl = 'data:image/svg+xml;base64,' + btoa(svg);
      return L.icon({
        iconUrl: iconUrl,
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
      });
    }

    var blueIcon = createSvgIcon('#0066cc');
    var brownIcon = createSvgIcon('#8B4513');

    function getIconForLineas(lineas) {
      return activeLine === 'L1' ? blueIcon : brownIcon;
    }

    function createColoredMarker(lat, lon, lineas, title) {
      var marker = L.marker([lat, lon], { icon: getIconForLineas(lineas), title: title || '' });
      // add a tooltip for sighted users
      marker.bindTooltip(title || '', { direction: 'top', offset: [0, -10], permanent: false });
      return marker;
    }


    /* HORARIOS */

    var horariosL1 = [
      "08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00"
    ];

    var horariosL2 = [
      "15:30", "16:30", "17:30", "18:30", "19:30"
    ];


    /* FUNCIÓN PARA CREAR PARADAS */

    function parada(nombre, lat, lon, linea, horariosCustom = null) {
      stopsBounds.extend([lat, lon]);

      var lineas = Array.isArray(linea) ? linea : [linea];
      var marker = createColoredMarker(lat, lon, lineas, nombre);
      marker.lineas = lineas;
      marker.nombre = nombre;
      marker.horariosCustom = horariosCustom;

      marker.on('click', function () {
        showInfo(nombre, lineas, horariosCustom);
      });

      allMarkers.push(marker);
      if (lineas.includes(activeLine)) {
        marker.addTo(map);
      }
    }

    function showInfo(nombre, lineas, horariosCustom) {
      var content = buildScheduleGrid(nombre, lineas, horariosCustom);
      document.getElementById('info-content').innerHTML = content;
      var panel = document.getElementById('info-panel');
      panel.setAttribute('aria-hidden', 'false');
      panel.style.display = 'block';
      fontScale = 1;
      applyInfoFontScale();
      var btn = panel.querySelector('.close-btn');
      if (btn) btn.focus();
    }

    function hideInfo() {
      var panel = document.getElementById('info-panel');
      panel.setAttribute('aria-hidden', 'true');
      panel.style.display = 'none';
      fontScale = 1;
      applyInfoFontScale();
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
    }

    function shouldShowLine(lineas, line) {
      return lineas.includes(line);
    }

    function updateMarkerVisibility() {
      allMarkers.forEach(function (marker) {
        if (shouldShowLine(marker.lineas, activeLine)) {
          if (!map.hasLayer(marker)) {
            marker.addTo(map);
          }
        } else {
          if (map.hasLayer(marker)) {
            map.removeLayer(marker);
          }
        }
      });
    }

    function fitBoundsToActiveMarkers() {
      var bounds = L.latLngBounds([]);
      allMarkers.forEach(function (marker) {
        if (shouldShowLine(marker.lineas, activeLine)) {
          bounds.extend(marker.getLatLng());
        }
      });
      if (bounds.isValid()) {
        map.fitBounds(bounds, { padding: [80, 80] });
      }
    }

    var currentRouteControl = null;

    function updateMarkerIcons() {
      allMarkers.forEach(function (marker) {
        marker.setIcon(getIconForLineas(marker.lineas));
      });
    }

    function updateRouteDisplay() {
      if (currentRouteControl) {
        map.removeControl(currentRouteControl);
        currentRouteControl = null;
      }

      clearDirectionArrows();
      currentRouteControl = (activeLine === 'L1') ? routingControl : routingControlL2;
      currentRouteControl.addTo(map);
      currentRouteControl.route();

      updateMarkerVisibility();
      updateMarkerIcons();
      fitBoundsToActiveMarkers();
    }

    function setActiveLine(line) {
      activeLine = line;
      var b1 = document.getElementById('linea1-btn');
      var b2 = document.getElementById('linea2-btn');
      b1.classList.toggle('active', line === 'L1');
      b2.classList.toggle('active', line === 'L2');
      b1.setAttribute('aria-pressed', line === 'L1' ? 'true' : 'false');
      b2.setAttribute('aria-pressed', line === 'L2' ? 'true' : 'false');
      hideInfo();
      updateRouteDisplay();
    }

    var linea1Btn = document.getElementById('linea1-btn');
    var linea2Btn = document.getElementById('linea2-btn');
    var expandInfoBtn = document.getElementById('expand-info-btn');
    var speakInfoBtn = document.getElementById('speak-info-btn');
    var infoPanel = document.getElementById('info-panel');
    var infoContent = document.getElementById('info-content');
    var fontScale = 1;
    linea1Btn.addEventListener('click', function () { setActiveLine('L1'); });
    linea2Btn.addEventListener('click', function () { setActiveLine('L2'); });

    function applyInfoFontScale() {
      if (infoContent) {
        infoContent.setAttribute('data-font-scale', fontScale);
      }
    }

    if (expandInfoBtn) {
      expandInfoBtn.addEventListener('click', function () {
        if (fontScale < 4) {
          fontScale += 1;
          applyInfoFontScale();
        } else {
          fontScale = 1;
          applyInfoFontScale();
        }
      });
    }

    function getSpeechRate() {
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      return isIOS ? 0.68 : 0.75;
    }

    if (speakInfoBtn) {
      speakInfoBtn.addEventListener('click', function () {
        if (!('speechSynthesis' in window)) {
          alert('Tu navegador no soporta lectura por voz.');
          return;
        }
        var textToSpeak = infoContent ? infoContent.innerText : '';
        if (!textToSpeak.trim()) return;
        window.speechSynthesis.cancel();
        var utterance = new SpeechSynthesisUtterance(textToSpeak);
        utterance.lang = 'es-ES';
        utterance.rate = getSpeechRate();
        utterance.pitch = 1;
        utterance.volume = 1;

        var voices = window.speechSynthesis.getVoices();
        var preferredVoice = voices.find(function (voice) {
          return /es|es-ES/i.test(voice.lang);
        });
        if (preferredVoice) {
          utterance.voice = preferredVoice;
        }

        window.speechSynthesis.speak(utterance);
      });
    }

    function buildScheduleGrid(nombre, lineas, horariosCustom) {
      var html = '<b>' + nombre + '</b><br><br>';
      html += '<div class="schedule-grid">';

      lineas.forEach(function (l) {
        var horarios = horariosCustom && horariosCustom[l] ? horariosCustom[l] : (l === 'L1' ? horariosL1 : horariosL2);
        html += '<div class="schedule-column">';
        html += '<div class="schedule-line"> ' + l + '</div>';
        horarios.forEach(function (h) {
          html += '<div class="schedule-time">' + h + '</div>';
        });
        html += '</div>';
      });

      html += '</div>';
      return html;
    }

    // Cerrar panel al hacer click en el mapa
    map.on('click', function () {
      hideInfo();
    });

    setActiveLine(activeLine);

    /* PARADAS L1 */
    parada("Silo", 39.89606049320882, -5.544903589159379, "L1", { L1: ["08:00", "09:00", "10:00", "11:00", "12:00", "13:00", "14:00"] });
    parada("Navarrosa", 39.896962797655945, -5.538585727664585, "L1", { L1: ["08:05", "09:05", "10:05", "11:05", "12:05", "13:05", "14:05"] });
    parada("Marcha Verde", 39.890748, -5.531859, "L1", { L1: ["08:10", "09:10", "10:10", "11:10", "12:10", "13:10", "14:10"] });
    parada("La Gota", 39.890326, -5.535922, "L1", { L1: ["08:15", "09:15", "10:15", "11:15", "12:15", "13:15", "14:15"] });
    parada("Los Colorines", 39.892250, -5.538347, "L1");
    parada("Estación de Autobuses", 39.89479316046357, -5.544554349363017, "L1");
    parada("Cruz de los Caídos", 39.892035005367596, -5.545145706808227, "L1");
    parada("Ambularorio", 39.892318482521254, -5.550908429949313, "L1");
    parada("Hospital Campo Arañuelo", 39.8884254926139, -5.561181591792536, "L1");
    parada("Ambularorio", 39.89221924461019, -5.551059787676879, "L1");
    parada("Ronda Sur", 39.89016270237608, -5.545865301655327, "L1");
    parada("Ronda Sur / Ctra. Valdehúncar", 39.888741480135465, -5.541166557744804, "L1");
    parada("La Gota", 39.890214305657715, -5.535739246910879, "L1");
    parada("Navarrosa", 39.897134, -5.538749, "L1");

    /* PARADAS L2 */
    parada("Cruz de los Caídos", 39.892035005367596, -5.545145706808227, "L2");
    parada("Ronda Sur", 39.89016270237608, -5.545865301655327, "L2");
    parada("Ronda Sur / Ctra. Valdehúncar", 39.888741480135465, -5.541166557744804, "L2");
    parada("La Gota", 39.890214305657715, -5.535739246910879, "L2");
    parada("Navarrosa", 39.897134, -5.538749, "L2");
    parada("Campo de Fútbol", 39.89774207768, -5.544290645204779, "L2");
    parada("Ciudad Deportiva", 39.91270936623701, -5.559816319323396, "L2");



  </script>
